# binfmt_misc entry for box64
# Tells the Linux kernel to transparently run x86_64 ELF executables through box64.
# Magic bytes match: ELF64 + little-endian + ET_EXEC + EM_X86_64 (0x3e)
# The 'F' flag (fix binary) is important — keeps the interpreter path fixed
# so it works correctly inside chroots and after path changes.
#
# Format: :name:type:offset:magic:mask:interpreter:flags
:box64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x3e\x00:\xff\xff\xff\xff\xff\xfe\xfe\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/box64:F
